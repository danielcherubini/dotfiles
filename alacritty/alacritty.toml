[env]
TERM = "screen-256color"

[window]
padding = { x = 4, y = 4 }
decorations = "none"
opacity = 1
startup_mode = "Windowed"
title = "Alacritty"

[font]
size = 12.0

[font.normal]
family = "Fira Code NerdFont"

[font.italic]
family = "Operator Mono Book Italic"

[font.bold_italic]
family = "Operator Mono"
style = "Medium Italic"

[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"

[colors.cursor]
text = "#44475a"
cursor = "#f8f8f2"

[colors.normal]
black = "#000000"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#bfbfbf"

[colors.bright]
black = "#4d4d4d"
red = "#ff6e67"
green = "#5af78e"
yellow = "#f4f99d"
blue = "#caa9fa"
magenta = "#ff92d0"
cyan = "#9aedfe"
white = "#e6e6e6"

[colors.dim]
black = "#14151b"
red = "#ff2222"
green = "#1ef956"
yellow = "#ebf85b"
blue = "#4d5b86"
magenta = "#ff46b0"
cyan = "#59dffc"
white = "#e6e6d1"

[selection]
save_to_clipboard = true
